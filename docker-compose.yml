services:
  postgres:
    image: postgres:16-alpine
    container_name: arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
    ports:
      - "5432:5432"
    volumes:
      - arena-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: arena-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - arena-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  arena-postgres-data:
  arena-redis-data:
